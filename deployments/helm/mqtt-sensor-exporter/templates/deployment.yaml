apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mqtt-sensor-exporter.fullname" . }}
  labels:
    {{- include "mqtt-sensor-exporter.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mqtt-sensor-exporter.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "mqtt-sensor-exporter.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mqtt-sensor-exporter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: manager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /manager
        args:
          {{- if .Values.operator.leaderElection }}
          - --leader-elect
          {{- end }}
          - --health-probe-bind-address=:{{ .Values.operator.health.port }}
          {{- if not .Values.operator.installCRDs }}
          - --install-crds=false
          {{- end }}
        ports:
        {{- if .Values.operator.metrics.enabled }}
        - containerPort: {{ .Values.operator.metrics.port }}
          name: metrics
          protocol: TCP
        {{- end }}
        - containerPort: {{ .Values.operator.health.port }}
          name: health
          protocol: TCP
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
        - name: LOG_LEVEL
          value: {{ .Values.logging.level | quote }}
        - name: LOG_FORMAT
          value: {{ .Values.logging.format | quote }}
      {{- if .Values.operator.metrics.enabled }}
      - name: kube-rbac-proxy
        image: "{{ .Values.kubeRbacProxy.image.repository }}:{{ .Values.kubeRbacProxy.image.tag }}"
        imagePullPolicy: {{ .Values.kubeRbacProxy.image.pullPolicy }}
        args:
          - --secure-listen-address=0.0.0.0:{{ .Values.operator.metrics.port }}
          - --upstream=http://127.0.0.1:8080/
          - --logtostderr=true
          - --v=0
        ports:
        - containerPort: {{ .Values.operator.metrics.port }}
          name: https
          protocol: TCP
        resources:
          {{- toYaml .Values.kubeRbacProxy.resources | nindent 12 }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
