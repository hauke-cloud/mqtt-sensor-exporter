{{- if and .Values.rbac.create .Values.operator.leaderElection -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mqtt-sensor-exporter.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mqtt-sensor-exporter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mqtt-sensor-exporter.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "mqtt-sensor-exporter.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
