# Example configuration for enabling the REST API with Ingress and client certificate authentication
#
# This example shows how to expose the mqtt-sensor-exporter REST API using an Ingress controller
# with TLS termination and client certificate authentication handled at the ingress level.
#
# Usage:
#   helm install mqtt-sensor-exporter ./mqtt-sensor-exporter -f values-api-example.yaml

# Enable and configure the REST API
api:
  enabled: true
  port: 8080
  bindAddress: ":8080"
  
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  
  ingress:
    enabled: true
    className: "nginx"  # or "traefik", depending on your ingress controller
    
    annotations:
      # TLS certificate management (using cert-manager)
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      
      # Client certificate authentication (nginx ingress controller)
      # Requires a secret containing the CA certificate for validating client certs
      nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
      nginx.ingress.kubernetes.io/auth-tls-secret: "default/mqtt-api-client-ca"
      nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
      nginx.ingress.kubernetes.io/auth-tls-error-page: "https://example.com/cert-error.html"
      
      # Optional: Pass client certificate info to backend
      nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "true"
      
      # Optional: Additional security headers
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    
    hosts:
      - host: mqtt-api.example.com
        paths:
          - path: /
            pathType: Prefix
    
    tls:
      - secretName: mqtt-api-tls
        hosts:
          - mqtt-api.example.com

