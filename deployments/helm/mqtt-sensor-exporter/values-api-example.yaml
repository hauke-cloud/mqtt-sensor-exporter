# Setup Instructions:
#
# 1. Create a secret with the CA certificate for validating client certificates:
#
#    kubectl create secret generic mqtt-api-client-ca \
#      --from-file=ca.crt=/path/to/client-ca.crt \
#      --namespace=default
#
# 2. (Optional) If using cert-manager, create a ClusterIssuer:
#
#    apiVersion: cert-manager.io/v1
#    kind: ClusterIssuer
#    metadata:
#      name: letsencrypt-prod
#    spec:
#      acme:
#        server: https://acme-v02.api.letsencrypt.org/directory
#        email: admin@example.com
#        privateKeySecretRef:
#          name: letsencrypt-prod
#        solvers:
#        - http01:
#            ingress:
#              class: nginx
#
# 3. Deploy the Helm chart:
#
#    helm install mqtt-sensor-exporter ./mqtt-sensor-exporter \
#      -f values-api-example.yaml \
#      --namespace iot-system \
#      --create-namespace
#
# 4. Generate client certificates signed by your CA:
#
#    # Generate client private key
#    openssl genrsa -out client.key 4096
#    
#    # Generate client certificate signing request
#    openssl req -new -key client.key -out client.csr \
#      -subj "/CN=monitoring-client/O=example.com"
#    
#    # Sign with your CA
#    openssl x509 -req -days 365 -in client.csr \
#      -CA ca.crt -CAkey ca.key -CAcreateserial \
#      -out client.crt
#
# 5. Test the API with curl:
#
#    curl --cert client.crt --key client.key \
#      https://mqtt-api.example.com/v2/api/alerts
#
# API Endpoints:
#   - GET /v2/api/alerts - Get all devices with triggered alerts
#   - GET /health - Health check endpoint (no auth required)
