---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: databases.mqtt.hauke.cloud
spec:
  group: mqtt.hauke.cloud
  names:
    kind: Database
    listKind: DatabaseList
    plural: databases
    shortNames:
    - db
    - dbs
    singular: database
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.host
      name: Host
      type: string
    - jsonPath: .spec.database
      name: Database
      type: string
    - jsonPath: .spec.supportedSensorTypes
      name: Supports
      type: string
    - jsonPath: .status.connectionState
      name: State
      type: string
    - jsonPath: .status.measurementsWritten
      name: Measurements
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Database is the Schema for the databases API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatabaseSpec defines the desired state of Database
            properties:
              batchSize:
                default: 100
                description: BatchSize is the number of measurements to batch before
                  writing
                format: int32
                maximum: 1000
                minimum: 1
                type: integer
              batchTimeout:
                default: 10
                description: BatchTimeout is the maximum time to wait before writing
                  a partial batch (in seconds)
                format: int32
                maximum: 300
                minimum: 1
                type: integer
              caSecretRef:
                description: |-
                  CASecretRef is a reference to a Kubernetes Secret containing the CA certificate
                  The secret should contain key: "ca.crt"
                  Required for sslMode "verify-ca" or "verify-full"
                properties:
                  name:
                    description: Name of the secret
                    type: string
                  namespace:
                    description: Namespace of the secret. If not specified, uses the
                      same namespace as the MQTTBridge
                    type: string
                required:
                - name
                type: object
              clientCertSecretRef:
                description: |-
                  ClientCertSecretRef is a reference to a Kubernetes Secret containing client certificate
                  The secret should contain keys: "tls.crt" (client certificate) and "tls.key" (client key)
                  Required if PasswordSecretRef is not specified
                properties:
                  name:
                    description: Name of the secret
                    type: string
                  namespace:
                    description: Namespace of the secret. If not specified, uses the
                      same namespace as the MQTTBridge
                    type: string
                required:
                - name
                type: object
              database:
                description: Database name to connect to
                minLength: 1
                type: string
              host:
                description: Host is the database hostname or IP address
                minLength: 1
                type: string
              maxConnections:
                default: 10
                description: MaxConnections is the maximum number of connections in
                  the pool
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              minConnections:
                default: 2
                description: MinConnections is the minimum number of connections in
                  the pool
                format: int32
                maximum: 10
                minimum: 0
                type: integer
              passwordSecretRef:
                description: |-
                  PasswordSecretRef is a reference to a Kubernetes Secret containing the database password
                  The secret should contain key: "password"
                  Required if ClientCertSecretRef is not specified
                properties:
                  name:
                    description: Name of the secret
                    type: string
                  namespace:
                    description: Namespace of the secret. If not specified, uses the
                      same namespace as the MQTTBridge
                    type: string
                required:
                - name
                type: object
              port:
                default: 5432
                description: Port is the database port
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              sslMode:
                default: require
                description: |-
                  SSLMode determines the SSL/TLS connection mode
                  Supported modes: "disable", "require", "verify-ca", "verify-full"
                enum:
                - disable
                - require
                - verify-ca
                - verify-full
                type: string
              supportedSensorTypes:
                description: |-
                  SupportedSensorTypes specifies which sensor types this database can handle
                  Devices with matching sensorType will have their measurements stored in this database
                  Each sensor type will have its own GORM handler and table(s)
                  Supported types: "valve", "moisture", "power", "solar", "temperature", "humidity", "pressure", "water_level", "room"
                items:
                  type: string
                minItems: 1
                type: array
              username:
                description: Username for database authentication
                minLength: 1
                type: string
            required:
            - database
            - host
            - port
            - username
            type: object
          status:
            description: DatabaseStatus defines the observed state of Database
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the database's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              connectionState:
                description: ConnectionState indicates the current database connection
                  state
                enum:
                - Connected
                - Disconnected
                - Error
                - Initializing
                type: string
              lastConnectedTime:
                description: LastConnectedTime is the timestamp of the last successful
                  connection
                format: date-time
                type: string
              lastWriteTime:
                description: LastWriteTime is the timestamp of the last successful
                  write
                format: date-time
                type: string
              measurementsWritten:
                description: MeasurementsWritten is the total number of measurements
                  written to this database
                format: int64
                type: integer
              message:
                description: Message provides additional information about the connection
                  state
                type: string
              pendingBatch:
                description: PendingBatch is the number of measurements waiting to
                  be written
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
