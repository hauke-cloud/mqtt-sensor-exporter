---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: devices.mqtt.hauke.cloud
spec:
  group: mqtt.hauke.cloud
  names:
    kind: Device
    listKind: DeviceList
    plural: devices
    singular: device
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.shortAddr
      name: Short Addr
      type: string
    - jsonPath: .spec.friendlyName
      name: Friendly Name
      type: string
    - jsonPath: .spec.sensorType
      name: Sensor Type
      type: string
    - jsonPath: .status.lastPowerState
      name: Power
      priority: 1
      type: integer
    - jsonPath: .status.batteryPercentage
      name: Battery
      type: integer
    - jsonPath: .status.linkQuality
      name: Link Quality
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .status.deviceType
      name: Type
      type: string
    - jsonPath: .status.available
      name: Available
      type: boolean
    - jsonPath: .status.batteryLevel
      name: Battery
      type: integer
    - jsonPath: .status.lastSeen
      name: Last Seen
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Device is the Schema for the devices API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Device
            properties:
              alertCondition:
                description: |-
                  AlertCondition defines a condition that triggers an alert when met
                  When the condition evaluates to true, status.alert is set to true
                properties:
                  measurement:
                    description: Measurement is the name of the measurement to check
                      (e.g., "temperature", "humidity")
                    minLength: 1
                    type: string
                  operator:
                    description: |-
                      Operator defines the comparison operator
                      Supported operators: "above", "below", "is"
                    enum:
                    - above
                    - below
                    - is
                    type: string
                  value:
                    description: |-
                      Value is the threshold value to compare against
                      Stored as string for cross-language compatibility (e.g., "25.0", "30.5")
                    pattern: ^-?\d+(\.\d+)?$
                    type: string
                required:
                - measurement
                - operator
                - value
                type: object
              bridgeRef:
                description: |-
                  BridgeRef references the MQTTBridge this device belongs to
                  This field is set by the operator and should not be modified by users
                properties:
                  name:
                    description: Name of the MQTTBridge
                    type: string
                  namespace:
                    description: Namespace of the MQTTBridge. If not specified, uses
                      the same namespace as the Device
                    type: string
                required:
                - name
                type: object
              corrections:
                additionalProperties:
                  type: string
                description: |-
                  Corrections is an optional value that can be used to apply correction factors to the device's measurements
                  Values are stored as strings to ensure cross-language compatibility (e.g., "2.5", "-1.8")
                type: object
              disabled:
                default: false
                description: Disabled indicates whether measurements from this device
                  should be ignored
                type: boolean
              friendlyName:
                description: FriendlyName is a user-configurable name for the device
                type: string
              ieeeAddr:
                description: |-
                  IEEEAddr is the unique IEEE address of the device (set by operator)
                  This is the immutable identifier from Zigbee/MQTT discovery
                type: string
              location:
                description: Location describes where the device is physically located
                type: string
              metadataLabels:
                additionalProperties:
                  type: string
                description: MetadataLabels are custom key-value pairs for user-defined
                  metadata
                type: object
              room:
                description: Room for grouping devices by room
                type: string
              sensorType:
                description: |-
                  SensorType specifies what type of measurements this device provides
                  This determines which database and GORM handler to use for storing data
                  Supported types: "valve", "moisture", "power", "solar", "temperature", "humidity", "pressure", "water_level"
                enum:
                - valve
                - moisture
                - power
                - solar
                - temperature
                - humidity
                - pressure
                - water_level
                type: string
            required:
            - bridgeRef
            - ieeeAddr
            type: object
          status:
            description: status defines the observed state of Device
            properties:
              alert:
                description: Alert show if this device triggered the alert condition
                type: boolean
              available:
                description: Available indicates whether the device is currently reachable
                  (deprecated, use Reachable)
                type: boolean
              batteryLastSeenEpoch:
                description: BatteryLastSeenEpoch is the Unix epoch timestamp when
                  battery level was last updated
                format: int64
                type: integer
              batteryLevel:
                description: BatteryLevel indicates the battery percentage (0-100)
                  if applicable (deprecated, use BatteryPercentage)
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              batteryPercentage:
                description: BatteryPercentage indicates the battery percentage (0-100)
                  if applicable
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              capabilities:
                description: |-
                  Capabilities lists what the device can measure or control
                  Examples: temperature, humidity, pressure, battery, water_leak, occupancy
                items:
                  type: string
                type: array
              conditions:
                description: Conditions represent the current state of the Device
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deviceType:
                description: DeviceType indicates the type of device (e.g., sensor,
                  actuator, switch)
                type: string
              lastMeasurement:
                description: |-
                  LastMeasurement contains the most recent measurement data as JSON string
                  Deprecated: Use Measurements map instead for detailed measurement tracking
                type: string
              lastPowerState:
                description: |-
                  LastPowerState contains the most recent power state for devices that support power control/sensing
                  This field provides a stable reference for monitoring valve states and other power-controlled devices
                  Typically 0 (off) or 1 (on), but may vary by device type
                format: int32
                type: integer
              lastSeen:
                description: LastSeen is the timestamp when the device last sent data
                format: date-time
                type: string
              lastSeenEpoch:
                description: LastSeenEpoch is the Unix epoch timestamp when the device
                  was last seen
                format: int64
                type: integer
              lastSeenSeconds:
                description: LastSeenSeconds is the number of seconds since the device
                  was last seen
                format: int32
                type: integer
              linkQuality:
                description: LinkQuality indicates the signal quality (0-255)
                format: int32
                maximum: 255
                minimum: 0
                type: integer
              manufacturer:
                description: Manufacturer is the device manufacturer
                type: string
              measurements:
                additionalProperties:
                  description: MeasurementValue represents a single measurement with
                    its value, timestamp, and optional corrections
                  properties:
                    correctedValue:
                      description: |-
                        CorrectedValue is the value after applying the correction
                        Only set if a correction was applied
                      type: string
                    correction:
                      description: |-
                        Correction is the correction value applied to this measurement (if any)
                        Only set if a correction was configured for this measurement
                      type: string
                    lastSeen:
                      description: LastSeen is the timestamp when this measurement
                        was last received
                      format: date-time
                      type: string
                    value:
                      description: |-
                        Value is the raw measurement value received from the device
                        Stored as string for cross-language compatibility
                      type: string
                  required:
                  - lastSeen
                  - value
                  type: object
                description: |-
                  Measurements contains individual measurements with their values, timestamps, and corrections
                  Key is the measurement name (e.g., "temperature", "humidity", "pressure")
                  Value contains the measurement details including corrections if applied
                type: object
              modelId:
                description: ModelID is the device model identifier discovered from
                  MQTT
                type: string
              reachable:
                description: Reachable indicates whether the device is currently reachable
                type: boolean
              shortAddr:
                description: |-
                  ShortAddr is the short Zigbee address (e.g., "0x4F2E")
                  This is used to map MQTT messages to devices
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
