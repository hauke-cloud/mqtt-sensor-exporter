---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: mqttbridges.mqtt.hauke.cloud
spec:
  group: mqtt.hauke.cloud
  names:
    kind: MQTTBridge
    listKind: MQTTBridgeList
    plural: mqttbridges
    shortNames:
    - bridge
    - bridges
    singular: mqttbridge
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.host
      name: Host
      type: string
    - jsonPath: .spec.port
      name: Port
      type: integer
    - jsonPath: .status.connectionState
      name: State
      type: string
    - jsonPath: .status.discoveredDevices
      name: Devices
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: MQTTBridge is the Schema for the mqttbridges API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of MQTTBridge
            properties:
              bridgeName:
                description: |-
                  BridgeName is the device name for Tasmota bridges
                  For Tasmota: tele/<bridgeName>/SENSOR
                  If not specified, subscribes to wildcard: tele/+/SENSOR
                type: string
              clientId:
                description: |-
                  ClientID is the MQTT client identifier
                  If not specified, a unique client ID will be generated
                type: string
              credentialsSecretRef:
                description: |-
                  CredentialsSecretRef is a reference to a Kubernetes Secret containing MQTT credentials
                  The secret should contain keys: "username" and "password"
                properties:
                  name:
                    description: Name of the secret
                    type: string
                  namespace:
                    description: Namespace of the secret. If not specified, uses the
                      same namespace as the MQTTBridge
                    type: string
                required:
                - name
                type: object
              deviceType:
                default: tasmota
                description: |-
                  DeviceType specifies the MQTT device ecosystem
                  Supported types: "zigbee2mqtt", "tasmota", "generic"
                  Different device types use different topic structures and discovery methods
                enum:
                - zigbee2mqtt
                - tasmota
                - generic
                type: string
              discoveryEnabled:
                default: true
                description: DiscoveryEnabled enables automatic device discovery
                type: boolean
              host:
                description: Host is the MQTT broker hostname or IP address
                minLength: 1
                type: string
              port:
                default: 1883
                description: Port is the MQTT broker port
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              tls:
                description: TLS configuration for secure MQTT connection
                properties:
                  caSecretRef:
                    description: |-
                      CASecretRef references a secret containing the CA certificate
                      The secret should contain key: "ca.crt"
                    properties:
                      name:
                        description: Name of the secret
                        type: string
                      namespace:
                        description: Namespace of the secret. If not specified, uses
                          the same namespace as the MQTTBridge
                        type: string
                    required:
                    - name
                    type: object
                  enabled:
                    default: false
                    description: Enabled indicates whether TLS should be used
                    type: boolean
                  insecureSkipVerify:
                    default: false
                    description: InsecureSkipVerify skips server certificate verification
                      (not recommended for production)
                    type: boolean
                required:
                - enabled
                type: object
              topicPrefix:
                description: |-
                  TopicPrefix is the base topic to subscribe to for device discovery
                  For Zigbee2MQTT, this is typically "zigbee2mqtt"
                  For Tasmota with multiple topics, use Topics field instead
                type: string
              topics:
                description: |-
                  Topics is a list of topic subscriptions with their types
                  Use this for advanced configurations like Tasmota with multiple topic types
                  If specified, TopicPrefix is ignored
                items:
                  description: TopicSubscription defines an MQTT topic to subscribe
                    to with its type
                  properties:
                    qos:
                      default: 0
                      description: |-
                        QoS is the MQTT Quality of Service level for this subscription
                        0 = At most once, 1 = At least once, 2 = Exactly once
                      format: int32
                      maximum: 2
                      minimum: 0
                      type: integer
                    topic:
                      description: |-
                        Topic is the MQTT topic pattern to subscribe to
                        Supports MQTT wildcards: + (single level), # (multi-level)
                        Examples: "tele/+/SENSOR", "stat/tasmota_123/RESULT", "zigbee2mqtt/#"
                      minLength: 1
                      type: string
                    type:
                      description: |-
                        Type indicates how to process messages from this topic
                        For Tasmota: "telemetry", "status", "state", "result"
                        For Zigbee2MQTT: "device", "bridge"
                        For Generic: "sensor", "command", "status", or custom
                      minLength: 1
                      type: string
                  required:
                  - topic
                  - type
                  type: object
                type: array
            required:
            - host
            - port
            type: object
          status:
            description: status defines the observed state of MQTTBridge
            properties:
              conditions:
                description: Conditions represent the current state of the MQTTBridge
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              connectionState:
                description: ConnectionState indicates whether the bridge is connected
                  to the MQTT broker
                enum:
                - Connected
                - Disconnected
                - Error
                - Unknown
                type: string
              discoveredDevices:
                description: DiscoveredDevices is the number of devices discovered
                  on this bridge
                format: int32
                type: integer
              lastConnectedTime:
                description: LastConnectedTime is the timestamp when the bridge last
                  successfully connected
                format: date-time
                type: string
              message:
                description: Message provides additional information about the current
                  state
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
