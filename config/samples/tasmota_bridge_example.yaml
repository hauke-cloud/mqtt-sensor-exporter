# Example: Tasmota as Zigbee Bridge with Multiple Topics
# 
# This example shows how to configure a single MQTTBridge to subscribe
# to multiple Tasmota topics (tele, stat, cmnd) with different types.
# Each topic type will be handled by a specific controller.

---
apiVersion: v1
kind: Secret
metadata:
  name: mqtt-credentials
  namespace: default
type: Opaque
stringData:
  username: "mqtt-user"
  password: "mqtt-password"

---
# Single bridge with multiple topic subscriptions
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: MQTTBridge
metadata:
  name: tasmota-zigbee-bridge
  namespace: default
spec:
  host: "mqtt.local"
  port: 1883
  credentialsSecretRef:
    name: mqtt-credentials
  
  deviceType: "tasmota"
  bridgeName: "tasmota_bridge_1"
  
  # Multiple topic subscriptions with different types
  # Each type is handled by a specific controller
  topics:
    # Telemetry - Contains ZbReceived with Zigbee device data
    - topic: "tele/tasmota_bridge_1/SENSOR"
      type: "telemetry"
      qos: 0
    
    # Status - Command responses and status updates
    - topic: "stat/tasmota_bridge_1/RESULT"
      type: "status"
      qos: 0
    
    # State - Periodic state information
    - topic: "tele/tasmota_bridge_1/STATE"
      type: "state"
      qos: 0
    
    # Info - Bridge information
    - topic: "tele/tasmota_bridge_1/INFO1"
      type: "info"
      qos: 0
  
  discoveryEnabled: true
  clientId: "mqtt-sensor-exporter-tasmota"

---
# Alternative: Subscribe to all Tasmota bridges with wildcards
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: MQTTBridge
metadata:
  name: tasmota-all-bridges
  namespace: default
spec:
  host: "mqtt.local"
  port: 1883
  credentialsSecretRef:
    name: mqtt-credentials
  
  deviceType: "tasmota"
  # No bridgeName specified - subscribes to all
  
  topics:
    # All telemetry from all Tasmota bridges
    - topic: "tele/+/SENSOR"
      type: "telemetry"
    
    # All status from all Tasmota bridges
    - topic: "stat/+/RESULT"
      type: "status"
    
    # All state from all Tasmota bridges
    - topic: "tele/+/STATE"
      type: "state"
  
  discoveryEnabled: true

---
# Example: Zigbee2MQTT for comparison (simple single topic)
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: MQTTBridge
metadata:
  name: zigbee2mqtt-bridge
  namespace: default
spec:
  host: "mqtt.local"
  port: 1883
  credentialsSecretRef:
    name: mqtt-credentials
  
  deviceType: "zigbee2mqtt"
  topicPrefix: "zigbee2mqtt"  # Simple prefix mode
  discoveryEnabled: true

---
