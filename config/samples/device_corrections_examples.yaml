# Device Examples with Measurement Corrections
#
# This file demonstrates how to configure measurement corrections
# for various types of sensors.

---
# Example 1: Temperature sensor that reads too high
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: living-room-temp-sensor
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0x4F2E"
  friendlyName: "Living Room Temperature Sensor"
  location: "Living Room"
  room: "living-room"
  sensorType: "temperature"
  
  # This sensor consistently reads 2.5°C too high
  # Applying -2.5 correction to get accurate readings
  corrections:
    temperature: "-2.5"

---
# Example 2: Humidity sensor that reads too low
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: bathroom-humidity-sensor
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xABCD"
  friendlyName: "Bathroom Humidity Sensor"
  location: "Bathroom"
  room: "bathroom"
  sensorType: "humidity"
  
  # Humidity sensor reads 5% too low compared to calibrated hygrometer
  corrections:
    humidity: "5.0"

---
# Example 3: Multi-sensor with multiple corrections
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: greenhouse-climate-sensor
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0x1234"
  friendlyName: "Greenhouse Climate Sensor"
  location: "Greenhouse"
  room: "greenhouse"
  sensorType: "moisture"
  
  # Multiple measurements need correction
  corrections:
    temperature: "-1.8"    # Reads 1.8°C too high due to solar heating of enclosure
    humidity: "3.5"        # Reads 3.5% too low
    pressure: -2.1       # Reads 2.1 hPa too high (altitude calibration)

---
# Example 4: Battery-powered sensor with voltage correction
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: outdoor-temp-sensor
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0x5678"
  friendlyName: "Outdoor Temperature Sensor"
  location: "Garden"
  room: "outdoor"
  sensorType: "temperature"
  
  # Voltage drops due to long wire, add 0.15V to compensate
  # Temperature affected by cold weather
  corrections:
    temperature: "0.5"     # Sensor reads slightly low in cold weather
    voltage: "0.15"        # Compensate for wire voltage drop

---
# Example 5: Moisture sensor with calibration
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: plant-moisture-sensor-1
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0x9ABC"
  friendlyName: "Tomato Plant Moisture Sensor"
  location: "Greenhouse Bed 1"
  room: "greenhouse"
  sensorType: "moisture"
  
  # Calibrated against gravimetric soil moisture measurement
  # This sensor reads 12% too high in moist soil
  corrections:
    humidity: "-12.0"      # Soil moisture is reported as "Humidity" by sensor
    temperature: "-0.8"    # Slight temperature offset

---
# Example 6: Pressure sensor with altitude correction
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: weather-station
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xDEF0"
  friendlyName: "Weather Station"
  location: "Roof"
  room: "outdoor"
  sensorType: "pressure"
  
  # Altitude correction for sea level pressure
  # Location is 250m above sea level
  # Approximate correction: +30 hPa
  corrections:
    pressure: "30.0"
    temperature: "-0.3"    # Sensor in direct sunlight reads slightly high

---
# Example 7: Link quality normalization
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: basement-sensor
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xFED1"
  friendlyName: "Basement Sensor"
  location: "Basement"
  room: "basement"
  sensorType: "temperature"
  
  # This sensor model reports link quality differently
  # Normalize to match other sensors in the network
  corrections:
    link_quality: "-20"    # Reduce by 20 to match scale of other sensors
    temperature: "1.2"     # Basement is cooler, sensor reads low

---
# Example 8: No corrections needed (for comparison)
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: office-sensor
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xBEEF"
  friendlyName: "Office Sensor"
  location: "Home Office"
  room: "office"
  sensorType: "temperature"
  
  # This sensor is accurate, no corrections needed
  # You can omit the corrections field entirely or leave it empty
  # corrections: {}

---
# Example 9: Power state sensor (integer correction)
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: water-valve-left
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xCAFE"
  friendlyName: "Left Water Valve"
  location: "Garden"
  room: "outdoor"
  sensorType: "valve"
  
  # For integer values like power state, corrections are truncated
  # Generally not needed for on/off values, but shown for completeness
  corrections:
    battery_percentage: "5"  # Battery reading is consistently 5% low

---
# Example 10: Complex scenario with thresholds and corrections
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: refrigerator-sensor
  namespace: default
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xF00D"
  friendlyName: "Refrigerator Temperature Sensor"
  location: "Kitchen"
  room: "kitchen"
  sensorType: "temperature"
  
  # Refrigerator should stay below 4°C
  thresholds:
    temperature: 4.0  # Alert if temperature goes above 4°C (after correction)
  
  # Sensor reads 1.5°C too high due to mounting position near motor
  corrections:
    temperature: "-1.5"
  
  metadataLabels:
    appliance: "refrigerator"
    critical: "true"
