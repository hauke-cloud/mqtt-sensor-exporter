    alert-reason: "Pump should be running during irrigation cycle"
    alert-action: "Check pump power supply and controller"
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xPUMP"
  friendlyName: "Irrigation Pump"
  location: "Pump House"
  room: "outdoor"
  sensorType: "power"
  
  # Alert when pump is off (power = 0)
  alertCondition:
    measurement: "power"
    operator: "is"
    value: 0
