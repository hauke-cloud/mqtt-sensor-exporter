---
# Example 14: Combined Corrections and Alerts
# Complete example with multiple features
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: lab-sensor
  namespace: default
  annotations:
    alert-reason: "Maintain lab environmental conditions"
    alert-action: "Adjust HVAC settings"
  labels:
    environment: "laboratory"
    critical: "true"
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xLAB1"
  friendlyName: "Laboratory Environmental Sensor"
  location: "Lab Room A"
  room: "laboratory"
  sensorType: "temperature"
  
  # Apply calibration corrections
  corrections:
    temperature: -1.2
    humidity: 3.5
  
  # Alert on high temperature (after correction)
  alertCondition:
    measurement: "temperature"
    operator: "above"
    value: 22.0
  
  metadataLabels:
    department: "research"
    equipment-type: "environmental-monitor"

