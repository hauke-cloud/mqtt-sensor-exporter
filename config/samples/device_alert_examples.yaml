---
# Example 5: Water Valve State Monitoring
# Alert when valve is closed (should normally be open)
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: irrigation-valve
  namespace: default
  annotations:
    alert-reason: "Irrigation should run during scheduled times"
    alert-action: "Check valve controller, verify water supply"
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0x9ABC"
  friendlyName: "Garden Irrigation Valve"
  location: "Garden"
  room: "outdoor"
  sensorType: "valve"
  
  # Alert when valve is closed (power = 0)
  alertCondition:
    measurement: "power"
    operator: "is"
    value: 0

