---
# Example 3: Refrigerator Temperature Monitoring
# Food safety - critical temperature monitoring
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: fridge-temp-sensor
  namespace: default
  annotations:
    alert-reason: "Food safety - prevent spoilage"
    alert-action: "Check refrigerator immediately, notify maintenance"
    critical: "true"
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0x1234"
  friendlyName: "Refrigerator Temperature Sensor"
  location: "Kitchen"
  room: "kitchen"
  sensorType: "temperature"
  
  # Sensor reads slightly high, correct it
  corrections:
    temperature: -0.5
  
  # Alert if temperature exceeds 4°C (after correction)
  alertCondition:
    measurement: "temperature"
    operator: "above"
    value: 4.0

