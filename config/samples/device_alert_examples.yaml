# Example 6: Low Battery Alert
# Critical - device needs battery replacement
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: outdoor-temp-sensor
  namespace: default
  annotations:
    alert-reason: "Low battery - replace soon to avoid data loss"
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xDEF0"
  friendlyName: "Outdoor Temperature Sensor"
  location: "Garden"
  room: "outdoor"
  sensorType: "temperature"
  
  # Alert when battery drops below 20%
  alertCondition:
    measurement: "battery_percentage"
    operator: "below"
    value: 20.0

