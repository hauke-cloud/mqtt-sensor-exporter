# Device Examples with Alert Conditions
#
# This file demonstrates how to configure alert conditions
# for various types of sensors and monitoring scenarios.

---
# Example 1: High Temperature Alert
# Greenhouse monitoring - alert when too hot
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: greenhouse-temp-sensor
  namespace: default
  annotations:
    alert-reason: "Protect plants from heat damage"
    alert-action: "Open ventilation, activate cooling system"
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0x4F2E"
  friendlyName: "Greenhouse Temperature Sensor"
  location: "Greenhouse"
  room: "greenhouse"
  sensorType: "temperature"
  
  # Alert if temperature exceeds 30°C
  alertCondition:
    measurement: "temperature"
    operator: "above"
    value: 30.0

---
