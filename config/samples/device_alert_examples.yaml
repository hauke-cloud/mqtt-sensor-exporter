# Example 11: Wine Cellar Temperature
# Precise temperature control
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: Device
metadata:
  name: wine-cellar-temp
  namespace: default
  annotations:
    alert-reason: "Maintain optimal wine storage temperature"
spec:
  bridgeRef:
    name: tasmota-bridge
  ieeeAddr: "0xWINE"
  friendlyName: "Wine Cellar Temperature"
  location: "Wine Cellar"
  room: "cellar"
  sensorType: "temperature"
  
  # Sensor slightly inaccurate, correct it
  corrections:
    temperature: -0.8
  
  # Alert if temperature exceeds 14°C (ideal is 12-13°C)
  alertCondition:
    measurement: "temperature"
    operator: "above"
    value: 14.0

