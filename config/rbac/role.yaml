---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - databases
  - devices
  - mqttbridges
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - databases/finalizers
  - devices/finalizers
  - mqttbridges/finalizers
  verbs:
  - update
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - databases/status
  - devices/status
  - mqttbridges/status
  verbs:
  - get
  - patch
  - update
