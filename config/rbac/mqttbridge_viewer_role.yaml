# This rule is not used by the project mqtt-sensor-exporter itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to mqtt.hauke.cloud resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mqtt-sensor-exporter
    app.kubernetes.io/managed-by: kustomize
  name: mqttbridge-viewer-role
rules:
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - mqttbridges
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - mqttbridges/status
  verbs:
  - get
